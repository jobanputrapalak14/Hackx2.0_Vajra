<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAJRA | Live Tracking Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Removed hardcoded Google Maps API Key -->
    <style>
        :root {
            --bg: #0a0a0c;
            --card-bg: rgba(20, 20, 25, 0.8);
            --accent-red: #ff4d4d;
            --accent-green: #00ff88;
            --accent-orange: #ffaa00;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #header {
            padding: 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
        }

        .status-badge {
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 10px;
            pointer-events: auto;
        }

        .status-safe { background: rgba(0, 255, 136, 0.2); color: var(--accent-green); border-color: var(--accent-green); }
        .status-risk { background: rgba(255, 77, 77, 0.2); color: var(--accent-red); border-color: var(--accent-red); animation: pulse-red 1.5s infinite; }
        .status-nosignal { background: rgba(255, 170, 0, 0.2); color: var(--accent-orange); border-color: var(--accent-orange); }

        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255, 77, 77, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 77, 77, 0); }
        }

        #map {
            flex: 1;
            width: 100%;
            background: #111;
        }

        #info-panel {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding: 25px;
            border-radius: 30px 30px 0 0;
            position: relative;
            z-index: 1001;
            box-shadow: 0 -20px 50px rgba(0,0,0,0.5);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .user-meta h2 { margin: 0; font-size: 1.5rem; letter-spacing: -0.5px; }
        .user-meta p { margin: 5px 0 0; opacity: 0.6; font-size: 0.9rem; }

        .time-badge {
            font-size: 0.8rem;
            background: var(--glass);
            padding: 5px 12px;
            border-radius: 10px;
            color: #888;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--glass);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .stat-card label { display: block; font-size: 0.75rem; opacity: 0.5; margin-bottom: 5px; text-transform: uppercase; }
        .stat-card span { font-weight: 600; font-size: 1.1rem; }

        .action-bar {
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border-radius: 18px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .btn-primary { background: white; color: black; }
        .btn-secondary { background: var(--glass); color: white; border: 1px solid var(--border); }
        .btn-danger { background: var(--accent-red); color: white; }
        .btn:active { transform: scale(0.95); }

        .legend {
            position: absolute;
            bottom: 300px;
            left: 20px;
            z-index: 1000;
            background: var(--card-bg);
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 0.8rem;
            backdrop-filter: blur(5px);
            border: 1px solid var(--border);
            pointer-events: auto;
        }

        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
    </style>
</head>
<body>

    <div id="header">
        <div id="status-chip" class="status-badge status-nosignal">
            <span>●</span> <span id="status-label">INITIALIZING</span>
        </div>
        <div id="alert-reason" style="display:none; color: var(--accent-red); font-weight: bold; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; backdrop-filter: blur(5px);">
        </div>
    </div>

    <div id="map"></div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background: #3388ff;"></div> Safe Route</div>
        <div class="legend-item"><div class="dot" style="background: var(--accent-red);"></div> User Path</div>
    </div>

    <div id="info-panel">
        <div class="panel-header">
            <div class="user-meta">
                <h2 id="userName">Vajra Emergency System</h2>
                <p id="userPhone">---</p>
            </div>
            <div class="time-badge" id="lastUpdated">Updated: Never</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <label>Destination</label>
                <span id="destText">---</span>
            </div>
            <div class="stat-card">
                <label>Status</label>
                <span id="distText">Tracking Active</span>
            </div>
        </div>

        <div class="action-bar">
            <a href="#" id="callBtn" class="btn btn-primary">📞 Call User</a>
            <button onclick="triggerEmergency()" class="btn btn-danger">🚨 Trigger SOS</button>
            <button onclick="openExternalMap()" class="btn btn-secondary">📍 Maps</button>
            <button onclick="copyCoords()" class="btn btn-secondary">📋 GPS</button>
        </div>
    </div>

    <script>
        let map, userMarker, actualPathLine, expectedPathLine;
        let lastLocation = null;
        let lastPingTime = null;

        const darkStyle = [
            { elementType: "geometry", stylers: [{ color: "#242f3e" }] },
            { elementType: "labels.text.stroke", stylers: [{ color: "#242f3e" }] },
            { elementType: "labels.text.fill", stylers: [{ color: "#746855" }] },
            { featureType: "administrative.locality", elementType: "labels.text.fill", stylers: [{ color: "#d59563" }] },
            { featureType: "poi", elementType: "labels.text.fill", stylers: [{ color: "#d59563" }] },
            { featureType: "road", elementType: "geometry", stylers: [{ color: "#38414e" }] },
            { featureType: "road", elementType: "geometry.stroke", stylers: [{ color: "#212a37" }] },
            { featureType: "road", elementType: "labels.text.fill", stylers: [{ color: "#9ca5b3" }] },
            { featureType: "road.highway", elementType: "geometry", stylers: [{ color: "#746855" }] },
            { featureType: "road.highway", elementType: "geometry.stroke", stylers: [{ color: "#1f2835" }] },
            { featureType: "water", elementType: "geometry", stylers: [{ color: "#17263c" }] }
        ];

        async function loadGoogleMaps() {
            try {
                const res = await fetch('/config');
                const config = await res.json();
                const key = config.googleMapsKey;
                
                return new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = `https://maps.googleapis.com/maps/api/js?key=${key}&callback=initMap`;
                    script.async = true;
                    script.defer = true;
                    script.onerror = reject;
                    const originalInitMap = window.initMap;
                    window.initMap = () => {
                        if (originalInitMap) originalInitMap();
                        resolve();
                    };
                    document.head.appendChild(script);
                });
            } catch (err) {
                console.error("Failed to load Google Maps config:", err);
                setStatusChip({ status: "CONFIG ERROR" });
            }
        }

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 19.076, lng: 72.877 },
                zoom: 15,
                styles: darkStyle,
                disableDefaultUI: true,
                zoomControl: false
            });

            userMarker = new google.maps.Marker({
                position: { lat: 19.076, lng: 72.877 },
                map: map,
                icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 8,
                    fillColor: "#3388ff",
                    fillOpacity: 1,
                    strokeWeight: 2,
                    strokeColor: "#ffffff"
                }
            });

            expectedPathLine = new google.maps.Polyline({
                path: [],
                geodesic: true,
                strokeColor: "#3388ff",
                strokeOpacity: 0.4,
                strokeWeight: 5,
                map: map
            });

            actualPathLine = new google.maps.Polyline({
                path: [],
                geodesic: true,
                strokeColor: "#ff4d4d",
                strokeOpacity: 1.0,
                strokeWeight: 3,
                icons: [{
                    icon: { path: "M 0,-1 0,1", strokeOpacity: 1, scale: 2 },
                    offset: "0",
                    repeat: "15px"
                }],
                map: map
            });
        }

        async function triggerEmergency() {
            const currentSessionId = window.location.hash.replace("#", "").split("?")[0];
            if (!currentSessionId) return alert("No active session");
            if (!confirm("🚨 MANUAL ESCALATION\n\nAre you sure you want to trigger a full medical/police alert? This will call all emergency contacts.")) return;
            try {
                const res = await fetch(`/sos`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        sessionId: currentSessionId,
                        escalatedByContact: true 
                    })
                });
                const data = await res.json();
                if (data.success) {
                    alert("🚨 EMERGENCY ESCALATED! Emergency services and contacts have been notified.");
                    fetchData();
                }
            } catch (err) { alert("Escalation failed. Please call 100/112 directly."); }
        }

        async function fetchData() {
            const currentSessionId = window.location.hash.replace("#", "").split("?")[0];
            if (!currentSessionId) {
                setStatusChip({ status: "AWAITING TRIP" });
                return;
            }
            try {
                const res = await fetch(`/track/${currentSessionId}`);
                if (!res.ok) {
                    if (res.status === 404) setStatusChip({ status: "SCANNING..." });
                    else throw new Error("Server Offline");
                    return;
                }
                const data = await res.json();
                updateUI(data);
            } catch (err) {
                console.error("Fetch Error:", err);
                setStatusChip({ status: "SYST. OFFLINE" });
            }
        }

        function updateUI(data) {
            document.getElementById("destText").innerText = data.destination || "Unknown";
            document.getElementById("userName").innerText = `Vajra Tracking System`;
            document.getElementById("userPhone").innerText = data.phone || "No Phone";
            document.getElementById("callBtn").href = `tel:${data.phone}`;

            if (data.currentLocation) {
                const pos = { lat: data.currentLocation.lat, lng: data.currentLocation.lng };
                userMarker.setPosition(pos);
                
                if (data.pathHistory) {
                    const history = data.pathHistory.map(p => ({ lat: p.lat, lng: p.lng }));
                    actualPathLine.setPath(history);
                }

                if (data.expectedRoute) {
                    const route = data.expectedRoute.map(p => ({ lat: p.lat, lng: p.lng }));
                    expectedPathLine.setPath(route);
                }

                if (!lastPingTime) map.setCenter(pos);
                lastPingTime = Date.now();
                lastLocation = [pos.lat, pos.lng];
            }

            setStatusChip(data);
        }

        function setStatusChip(data) {
            const chip = document.getElementById("status-chip");
            const lbl = document.getElementById("status-label");
            const reason = document.getElementById("alert-reason");

            if (data.status === "ACTIVE" || data.status === "SAFE") {
                chip.className = "status-badge status-safe";
                lbl.innerText = "SAFE";
            } else if (data.status === "RISK" || data.status === "ALERT") {
                chip.className = "status-badge status-risk";
                lbl.innerText = "ALERT";
            } else if (data.status === "NO_SESSION") {
                 chip.className = "status-badge status-nosignal";
                lbl.innerText = "NO SESSION ID";
            } else {
                chip.className = "status-badge status-nosignal";
                lbl.innerText = data.status || "NO SIGNAL";
            }

            if (data.alert) {
                reason.innerText = data.alert;
                reason.style.display = 'block';
            } else {
                reason.style.display = 'none';
            }
        }

        function updateTimer() {
            if (!lastPingTime) return;
            const sec = Math.floor((Date.now() - lastPingTime) / 1000);
            document.getElementById("lastUpdated").innerText = `Updated: ${sec}s ago`;
        }

        function openExternalMap() {
            if (lastLocation) window.open(`https://www.google.com/maps?q=${lastLocation[0]},${lastLocation[1]}`, '_blank');
        }

        function copyCoords() {
            if (lastLocation) {
                const text = `Vajra GPS: ${lastLocation[0]}, ${lastLocation[1]}`;
                navigator.clipboard.writeText(text);
                alert("Location link copied!");
            }
        }

        window.onload = async () => {
            await loadGoogleMaps();
            setInterval(fetchData, 5000);
            setInterval(updateTimer, 1000);
            fetchData();
        };
    </script>
</body>
</html>
